name: Go Build and Lint

permissions:
  contents: read

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  build:
    name: Build and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Run gofmt
        run: |
          gofmt -s -w .
          git --no-pager diff --exit-code --color=never

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -o twitch-discord-clips-webhook
